kind = "web"
previewPath = "/ebdaa-dashboard/"
title = "Ebdaa Skill Matrix - Dashboard"
version = "1.0.0"
id = "artifacts/ebdaa-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ebdaa-dashboard/" ]
localPort = 8082

[services.development]
run = "BASE_PATH=/ebdaa-dashboard/ pnpm --filter @workspace/ebdaa-dashboard run build"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ebdaa-dashboard", "run", "build" ]
publicDir = "artifacts/ebdaa-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/ebdaa-dashboard/"
