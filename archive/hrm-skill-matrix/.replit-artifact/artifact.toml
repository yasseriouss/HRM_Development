kind = "web"
previewPath = "/ebdaa-skill-matrix/"
title = "Ebdaa Skill Matrix"
version = "1.0.0"
id = "artifacts/ebdaa-skill-matrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ebdaa-skill-matrix/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/ebdaa-skill-matrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ebdaa-skill-matrix", "run", "build" ]
publicDir = "artifacts/ebdaa-skill-matrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5000"
BASE_PATH = "/ebdaa-skill-matrix/"
