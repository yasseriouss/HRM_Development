services:
  postgres:
    image: postgres:16-alpine
    container_name: ebdaa-postgres
    environment:
      POSTGRES_USER: ebdaa
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ebdaa_skill_matrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
