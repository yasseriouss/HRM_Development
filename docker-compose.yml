services:
  postgres:
    image: postgres:16-alpine
    container_name: hrm-postgres
    environment:
      POSTGRES_USER: hrm
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hrm_skill_matrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
