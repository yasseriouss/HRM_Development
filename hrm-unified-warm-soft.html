
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRM Unified | Professional Management Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: oklch(97% 0.018 70);
        --surface: oklch(99% 0.008 70);
        --fg: oklch(22% 0.02 50);
        --muted: oklch(50% 0.018 50);
        --border: oklch(90% 0.014 70);
        --accent: oklch(64% 0.13 28);
        --font-main: 'Comfortaa', cursive;
        --font-ar: 'Tajawal', sans-serif;
      }
      body {
        background-color: var(--bg);
        color: var(--fg);
        font-family: var(--font-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        max-width: 500px;
        text-align: center;
        backdrop-blur: 10px;
      }
      h1 { font-weight: 700; font-size: 2.5rem; margin-bottom: 8px; tracking: -0.02em; }
      p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        background: oklch(64% 0.13 28 / 0.1);
        color: var(--accent);
        border-radius: 99px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Theme Applied Successfully</div>
      <h1>HRM Unified</h1>
      <p>The management suite has been transformed with the <strong>Warm-Soft</strong> theme. Your dashboard, login, and sidebar are now optimized for a premium executive experience.</p>
    </div>
  </body>
</html>
